<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Registration</title>
  </head>
  <body>
    <form action="" method="post">
      <!-- Personal Details here -->
      <fieldset>
        <legend>Personal Details</legend>
        <div>
          <label for="name">Full Name:</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Enter your full name"
            required
          />
        </div>
        <br />
        <div>
          <label for="email">Email:</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
            required
          />
        </div>
        <br />
        <div>
          <label for="telphone">Phone Number:</label>
          <input
            type="tel"
            id="telphone"
            name="telphone"
            placeholder="Enter your phone number"
            required
          />
        </div>
      </fieldset>
      <fieldset>
        <legend>Your Preferences</legend>
        <div>
          <label for="age">Age:</label>
          <input type="number" id="age" name="age" min="16" max="90" />
        </div>
        <br />
        <div>
          <label>Preferrred Shift</label>
          <input type="radio" id="morning" name="shift" value="morning" />
          <label for="morning">Morning Shift</label>

          <input type="radio" id="evening" name="shift" value="evening" />
          <label for="evening">Evening Shift</label>
        </div>
        <br />
        <div>
          <label for="size">T-Shirt Size:</label>
          <select id="size" name="size">
            <option value="small">Small</option>
            <option value="medium">Medium</option>
            <option value="large">Large</option>
            <option value="extra-large">Extra Large</option>
          </select>
        </div>
      </fieldset>
      <input type="checkbox" id="terms" name="terms" required />
      <label for="terms">I agree to the terms and conditions</label>
      <br />

      <button type="submit" targer="_blank">Submit</button>
    </form>
  </body>
</html>
